<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интонатор</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #c8f542;
    --accent2: #42f5c8;
    --accent3: #f54242;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --success: #42f5a0;
    --warn: #f5c842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(200,245,66,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(66,245,200,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(1.4rem, 5vw, 2rem);
    letter-spacing: -0.02em;
    color: var(--accent);
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── TUNER DISPLAY ── */
  .tuner-wrap {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .tuner-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .note-big {
    font-family: 'Unbounded', sans-serif;
    font-size: 4rem;
    font-weight: 900;
    text-align: center;
    color: var(--accent);
    line-height: 1;
    transition: color 0.2s;
    min-height: 4.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .note-big .octave {
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--muted);
    align-self: flex-end;
    padding-bottom: 8px;
  }

  .freq-display {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  /* Needle meter */
  .meter-container {
    margin: 16px 0 8px;
    position: relative;
  }

  .meter-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    position: relative;
    overflow: visible;
  }

  .meter-zone-flat {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 42%;
    background: linear-gradient(90deg, rgba(245,66,66,0.3), transparent);
    border-radius: 4px 0 0 4px;
  }
  .meter-zone-sharp {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 42%;
    background: linear-gradient(270deg, rgba(245,66,66,0.3), transparent);
    border-radius: 0 4px 4px 0;
  }
  .meter-zone-center {
    position: absolute;
    left: 42%; right: 42%; top: 0; bottom: 0;
    background: rgba(66,245,160,0.2);
  }

  .meter-needle {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    transition: left 0.08s ease-out, background 0.2s;
    left: 50%;
  }

  .meter-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .cents-display {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    height: 1.2em;
    transition: color 0.2s;
  }

  /* ── TARGET NOTE ── */
  .target-bar {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .target-label {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .target-note {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent2);
    transition: all 0.3s;
  }

  .target-note.hit {
    color: var(--success);
    text-shadow: 0 0 20px var(--success);
  }

  .target-freq {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .progress-dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 120px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .dot.active { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .dot.done { background: var(--success); }

  /* ── SETTINGS ── */
  .settings-card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .settings-title {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .field-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  .hint {
    font-size: 0.55rem;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.5;
  }

  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .preset-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .preset-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .row2 {
    display: flex;
    gap: 12px;
  }

  .row2 .field-group {
    flex: 1;
  }

  /* ── CONTROLS ── */
  .controls {
    width: 100%;
    max-width: 400px;
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
  }

  /* ── MIC STATUS ── */
  .mic-status {
    width: 100%;
    max-width: 400px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .mic-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .mic-dot.active {
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── LOG ── */
  .log {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 2;
    min-height: 60px;
    max-height: 120px;
    overflow-y: auto;
  }

  .log-entry { display: flex; gap: 8px; align-items: center; }
  .log-entry.ok { color: var(--success); }
  .log-entry.miss { color: var(--accent3); }
  .log-entry.skip { color: var(--warn); }

  /* Flash overlay */
  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .flash.show { opacity: 0.08; }
  .flash.green { background: var(--success); }
  .flash.red { background: var(--accent3); }

  /* Waveform mini */
  canvas#waveform {
    width: 100%;
    max-width: 400px;
    height: 40px;
    display: block;
    margin-bottom: 16px;
    border-radius: 8px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<h1>ИНТОНАТОР</h1>
<div class="subtitle">Pitch Trainer & Tuner</div>

<!-- TUNER -->
<div class="tuner-wrap">
  <div class="note-big" id="detectedNote">
    <span id="noteName">—</span>
    <span class="octave" id="noteOctave"></span>
  </div>
  <div class="freq-display" id="freqDisplay">— Hz</div>

  <div class="meter-container">
    <div class="meter-track">
      <div class="meter-zone-flat"></div>
      <div class="meter-zone-center"></div>
      <div class="meter-zone-sharp"></div>
      <div class="meter-needle" id="needle"></div>
    </div>
    <div class="meter-labels">
      <span>-50¢</span>
      <span>-25¢</span>
      <span>0¢</span>
      <span>+25¢</span>
      <span>+50¢</span>
    </div>
  </div>
  <div class="cents-display" id="centsDisplay"></div>
</div>

<!-- TARGET -->
<div class="target-bar" id="targetBar" style="display:none">
  <div>
    <div class="target-label">Цель</div>
    <div class="target-note" id="targetNoteName">—</div>
    <div class="target-freq" id="targetFreqDisp"></div>
  </div>
  <div class="progress-dots" id="progressDots"></div>
</div>

<!-- MIC STATUS -->
<div class="mic-status">
  <div class="mic-dot" id="micDot"></div>
  <span id="micLabel">Микрофон не активен</span>
</div>

<!-- WAVEFORM -->
<canvas id="waveform"></canvas>

<!-- SETTINGS -->
<div class="settings-card">
  <div class="settings-title">Настройки упражнения</div>

  <div class="field-group">
    <label>Гамма / последовательность нот</label>
    <input type="text" id="scaleInput" value="C4 D4 E4 F4 G4 A4 B4 C5"
           placeholder="Например: C4 E4 G4 C5">
    <div class="presets">
      <button class="preset-btn" onclick="setPreset('major')">Мажор</button>
      <button class="preset-btn" onclick="setPreset('minor')">Минор</button>
      <button class="preset-btn" onclick="setPreset('blues')">Блюз</button>
      <button class="preset-btn" onclick="setPreset('chromatic')">Хромат.</button>
      <button class="preset-btn" onclick="setPreset('trumpet')">Труба C</button>
    </div>
    <div class="hint">Формат: нота + октава, через пробел. До = C, Ре = D, Ми = E... Диез: C#4, Бемоль: Bb3</div>
  </div>

  <div class="row2">
    <div class="field-group">
      <label>Темп (BPM)</label>
      <input type="number" id="bpmInput" value="60" min="20" max="240">
    </div>
    <div class="field-group">
      <label>Порог попадания</label>
      <select id="thresholdSelect">
        <option value="20">Лёгкий (±20¢)</option>
        <option value="12" selected>Средний (±12¢)</option>
        <option value="6">Строгий (±6¢)</option>
      </select>
    </div>
  </div>

  <div class="field-group">
    <label>Режим</label>
    <select id="modeSelect">
      <option value="loop">Зацикленный</option>
      <option value="once">Один проход</option>
      <option value="free">Свободный тюнер</option>
    </select>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn btn-primary" id="startBtn" onclick="startSession()">▶ Старт</button>
  <button class="btn btn-secondary" id="stopBtn" onclick="stopSession()" disabled>■ Стоп</button>
</div>

<!-- LOG -->
<div class="log" id="log"><span style="color:var(--muted)">Нажми Старт для начала упражнения...</span></div>

<script>
// ── NOTE MATH ──
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_ALIASES = { 'Db':'C#', 'Eb':'D#', 'Fb':'E', 'Gb':'F#', 'Ab':'G#', 'Bb':'A#', 'Cb':'B',
                        'До':'C','Ре':'D','Ми':'E','Фа':'F','Соль':'G','Ля':'A','Си':'B' };

function noteToFreq(note) {
  // Parse "C4", "C#4", "Bb3", etc.
  const m = note.match(/^([A-GА-Яa-g][b#]?)(\d)$/);
  if (!m) return null;
  let name = m[1].charAt(0).toUpperCase() + m[1].slice(1);
  const oct = parseInt(m[2]);
  if (NOTE_ALIASES[name]) name = NOTE_ALIASES[name];
  const idx = NOTE_NAMES.indexOf(name);
  if (idx < 0) return null;
  const midiNum = (oct + 1) * 12 + idx;
  return 440 * Math.pow(2, (midiNum - 69) / 12);
}

function freqToNote(freq) {
  if (freq <= 0) return null;
  const midiFloat = 12 * Math.log2(freq / 440) + 69;
  const midi = Math.round(midiFloat);
  const cents = Math.round((midiFloat - midi) * 100);
  const oct = Math.floor(midi / 12) - 1;
  const name = NOTE_NAMES[((midi % 12) + 12) % 12];
  return { name, oct, cents, midi, freq };
}

// ── PRESETS ──
const PRESETS = {
  major: 'C4 D4 E4 F4 G4 A4 B4 C5',
  minor: 'C4 D4 D#4 F4 G4 G#4 A#4 C5',
  blues: 'C4 D#4 F4 F#4 G4 A#4 C5',
  chromatic: 'C4 C#4 D4 D#4 E4 F4 F#4 G4 G#4 A4 A#4 B4 C5',
  trumpet: 'C4 D4 E4 F4 G4 A4 B4 C5 D5 E5 F5 G5'
};

function setPreset(key) {
  document.getElementById('scaleInput').value = PRESETS[key];
}

// ── AUDIO CONTEXT ──
let audioCtx = null;
let analyser = null;
let micStream = null;
let dataArray = null;
let tunerRAF = null;

// ── SESSION STATE ──
let sequence = [];
let currentIdx = 0;
let sessionActive = false;
let noteTimeout = null;
let holdCount = 0;
const HOLD_FRAMES = 10; // frames in tune to count as hit

let hitFrames = 0;
let currentTargetFreq = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

async function startMic() {
  const ctx = getAudioCtx();
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  const source = ctx.createMediaStreamSource(micStream);
  analyser = ctx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.85;
  source.connect(analyser);
  dataArray = new Float32Array(analyser.fftSize);
  document.getElementById('micDot').classList.add('active');
  document.getElementById('micLabel').textContent = 'Микрофон активен';
  startTunerLoop();
}

function stopMic() {
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  micStream = null;
  if (tunerRAF) cancelAnimationFrame(tunerRAF);
  tunerRAF = null;
  document.getElementById('micDot').classList.remove('active');
  document.getElementById('micLabel').textContent = 'Микрофон не активен';
}

// ── PITCH DETECTION (Autocorrelation) ──
function detectPitch() {
  if (!analyser) return null;
  analyser.getFloatTimeDomainData(dataArray);

  // RMS check
  let rms = 0;
  for (let i = 0; i < dataArray.length; i++) rms += dataArray[i] * dataArray[i];
  rms = Math.sqrt(rms / dataArray.length);
  if (rms < 0.04) return null;

  const ctx = getAudioCtx();
  const sr = ctx.sampleRate;
  const buf = dataArray;
  const n = buf.length;

  // Autocorrelation
  let best = -1, bestD = -1;
  const minPeriod = Math.floor(sr / 1200);
  const maxPeriod = Math.floor(sr / 60);

  for (let d = minPeriod; d <= maxPeriod; d++) {
    let corr = 0;
    for (let i = 0; i < n - d; i++) corr += buf[i] * buf[i + d];
    if (corr > best) { best = corr; bestD = d; }
  }

  if (bestD < 0) return null;
  // Parabolic interpolation
  const y1 = bestD > minPeriod ? autocorr(buf, bestD - 1) : best;
  const y3 = bestD < maxPeriod ? autocorr(buf, bestD + 1) : best;
  const d2 = bestD - 0.5 * (y3 - y1) / (2 * best - y1 - y3 + 1e-10);
  return sr / d2;
}

function autocorr(buf, d) {
  let c = 0;
  for (let i = 0; i < buf.length - d; i++) c += buf[i] * buf[i + d];
  return c;
}

// ── WAVEFORM ──
const wfCanvas = document.getElementById('waveform');
const wfCtx = wfCanvas.getContext('2d');
function drawWaveform() {
  if (!analyser) return;
  const W = wfCanvas.width = wfCanvas.offsetWidth * window.devicePixelRatio;
  const H = wfCanvas.height = wfCanvas.offsetHeight * window.devicePixelRatio;
  const td = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(td);
  wfCtx.clearRect(0,0,W,H);
  wfCtx.strokeStyle = 'rgba(200,245,66,0.5)';
  wfCtx.lineWidth = 1.5;
  wfCtx.beginPath();
  const sliceW = W / td.length;
  for (let i = 0; i < td.length; i++) {
    const v = td[i] / 128.0;
    const y = (v * H) / 2;
    if (i === 0) wfCtx.moveTo(0, y); else wfCtx.lineTo(i * sliceW, y);
  }
  wfCtx.stroke();
}

// ── TUNER LOOP ──
function startTunerLoop() {
  const threshold = parseInt(document.getElementById('thresholdSelect').value);

  function loop() {
    tunerRAF = requestAnimationFrame(loop);
    drawWaveform();
    const freq = detectPitch();

    if (!freq) {
      document.getElementById('noteName').textContent = '—';
      document.getElementById('noteOctave').textContent = '';
      document.getElementById('freqDisplay').textContent = '— Hz';
      document.getElementById('needle').style.left = '50%';
      document.getElementById('centsDisplay').textContent = '';
      document.getElementById('needle').style.background = 'var(--muted)';
      hitFrames = 0;
      return;
    }

    const info = freqToNote(freq);
    document.getElementById('noteName').textContent = info.name;
    document.getElementById('noteOctave').textContent = info.oct;
    document.getElementById('freqDisplay').textContent = freq.toFixed(1) + ' Hz';

    const pos = 50 + (info.cents / 100) * 100;
    document.getElementById('needle').style.left = Math.min(95, Math.max(5, pos)) + '%';

    const inTune = Math.abs(info.cents) <= threshold;
    document.getElementById('needle').style.background = inTune ? 'var(--success)' : (info.cents < 0 ? 'var(--accent3)' : 'var(--warn)');
    document.getElementById('centsDisplay').textContent = info.cents === 0 ? '✓ В строй' : (info.cents > 0 ? `+${info.cents}¢ (выше)` : `${info.cents}¢ (ниже)`);
    document.getElementById('centsDisplay').style.color = inTune ? 'var(--success)' : 'var(--muted)';

    // Target checking
    if (sessionActive && currentTargetFreq) {
      const targetInfo = freqToNote(currentTargetFreq);
      const sameNote = info.name === targetInfo.name && info.oct === targetInfo.oct;
      if (sameNote && inTune) {
        hitFrames++;
        if (hitFrames >= HOLD_FRAMES) {
          hitFrames = 0;
          noteHit();
        }
      } else {
        hitFrames = 0;
      }
    }
  }
  loop();
}

// ── PLAY REFERENCE TONE ──
function playTone(freq, duration = 0.4) {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const comp = ctx.createDynamicsCompressor();
  osc.connect(gain);
  gain.connect(comp);
  comp.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.value = freq;
  const t = ctx.currentTime;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.6, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.05);
}

// ── SESSION ──
async function startSession() {
  const raw = document.getElementById('scaleInput').value.trim().split(/\s+/);
  sequence = raw.filter(n => noteToFreq(n) !== null);
  if (sequence.length === 0) {
    addLog('Ошибка: не удалось распознать ни одну ноту', 'miss');
    return;
  }

  if (!micStream) {
    try {
      await startMic();
    } catch(e) {
      addLog('Нет доступа к микрофону', 'miss');
      return;
    }
  }

  sessionActive = true;
  currentIdx = 0;
  hitFrames = 0;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('targetBar').style.display = 'flex';
  renderDots();
  clearLog();
  addLog(`Гамма: ${sequence.join(' ')} | ${document.getElementById('bpmInput').value} BPM`, 'skip');

  const mode = document.getElementById('modeSelect').value;
  if (mode === 'free') {
    addLog('Режим: свободный тюнер', 'skip');
    return;
  }

  scheduleNext();
}

function scheduleNext() {
  if (!sessionActive) return;
  const bpm = parseInt(document.getElementById('bpmInput').value) || 60;
  const interval = (60000 / bpm);

  const note = sequence[currentIdx];
  const freq = noteToFreq(note);
  currentTargetFreq = freq;

  updateTargetDisplay(note, freq);
  playTone(freq, Math.min(0.5, interval / 1100));
  addLog(`♩ Нота: ${note} (${freq.toFixed(1)} Hz)`, 'skip');

  noteTimeout = setTimeout(() => {
    if (!sessionActive) return;
    advanceNote(false);
  }, interval);
}

function noteHit() {
  const note = sequence[currentIdx];
  document.getElementById('targetNoteName').classList.add('hit');
  setTimeout(() => document.getElementById('targetNoteName').classList.remove('hit'), 300);
  flashScreen('green');
  addLog(`✓ ${note} — ПОПАЛ`, 'ok');
  markDot(currentIdx, 'done');
  clearTimeout(noteTimeout);

  const bpm = parseInt(document.getElementById('bpmInput').value) || 60;
  const interval = (60000 / bpm);
  setTimeout(() => advanceNote(true), Math.max(200, interval * 0.3));
}

function advanceNote(wasHit) {
  if (!wasHit) {
    addLog(`✗ ${sequence[currentIdx]} — пропущена`, 'miss');
    flashScreen('red');
    markDot(currentIdx, '');
  }

  currentIdx++;
  const mode = document.getElementById('modeSelect').value;

  if (currentIdx >= sequence.length) {
    if (mode === 'loop') {
      currentIdx = 0;
      renderDots();
      addLog('— Повтор —', 'skip');
      scheduleNext();
    } else {
      stopSession();
      addLog('✓ Упражнение завершено!', 'ok');
    }
  } else {
    scheduleNext();
  }
}

function stopSession() {
  sessionActive = false;
  currentTargetFreq = null;
  hitFrames = 0;
  clearTimeout(noteTimeout);
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('targetBar').style.display = 'none';
}

// ── UI HELPERS ──
function updateTargetDisplay(note, freq) {
  document.getElementById('targetNoteName').textContent = note;
  document.getElementById('targetFreqDisp').textContent = freq.toFixed(1) + ' Hz';
}

function renderDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  sequence.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    if (i === currentIdx) d.classList.add('active');
    container.appendChild(d);
  });
}

function markDot(i, cls) {
  const d = document.getElementById(`dot-${i}`);
  if (!d) return;
  d.className = 'dot';
  if (cls) d.classList.add(cls);
  const next = document.getElementById(`dot-${i+1}`);
  if (next) next.classList.add('active');
}

function flashScreen(color) {
  const f = document.getElementById('flash');
  f.className = `flash ${color} show`;
  setTimeout(() => f.className = 'flash', 200);
}

const logEl = document.getElementById('log');
function addLog(msg, cls) {
  const e = document.createElement('div');
  e.className = `log-entry ${cls}`;
  e.textContent = msg;
  logEl.appendChild(e);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }
</script>
